<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentara CPG Clinical Portal</title>
  <style>
    :root {
      --primary-color: #005A9C;
      --sidebar-bg: #F4F7F6;
      --main-bg: #FFFFFF;
      --text-main: #333333;
      --text-muted: #666666;
      --border-color: #E0E0E0;
      --red-flag: #FFF5F5;
      --red-text: #C62828;
      --edu-bg: #E3F2FD;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; padding: 0; display: flex; height: 100vh; color: var(--text-main); overflow: hidden;
    }

    /* Navigation Sidebar */
    aside { width: 350px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
    .sidebar-header { background-color: var(--primary-color); color: white; padding: 20px; }
    .sidebar-header h1 { margin: 0 0 15px 0; font-size: 1.2rem; }
    #search-bar { width: 100%; padding: 10px; font-size: 1rem; border: none; border-radius: 4px; box-sizing: border-box; }
    #condition-list { flex-grow: 1; overflow-y: auto; padding: 10px; }

    .list-item { padding: 15px; background-color: white; border-radius: 6px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border-color); transition: 0.2s; }
    .list-item:hover { background-color: #E8F0FE; }
    .list-item-title { font-weight: bold; }
    .list-item-meta { font-size: 0.8rem; color: var(--text-muted); }

    /* Main Dashboard */
    main { flex-grow: 1; background-color: var(--main-bg); padding: 40px; overflow-y: auto; }
    .detail-view { max-width: 900px; }
    .detail-title { font-size: 2.2rem; color: var(--primary-color); margin: 5px 0 20px 0; }

    .red-flags-box { background: var(--red-flag); border: 1px solid #FFCDD2; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
    .red-flags-box h4 { color: var(--red-text); margin: 0 0 10px 0; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
    .card h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }

    .rec-box { margin-top: 15px; padding: 15px; border-left: 5px solid #ccc; background: #fdfdfd; border-radius: 4px; }
    .rec-box.high { border-left-color: #2E7D32; }
    .rec-box.mod { border-left-color: #F9A825; }
    .rec-box.not-rec { border-left-color: #C62828; }
    
    .code-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }

    /* Interactive Code Chips */
    .code-chip { 
      background: #eee; padding: 6px 10px; border-radius: 4px; 
      font-family: monospace; cursor: pointer; margin-right: 8px; 
      display: inline-block; margin-bottom: 8px; position: relative;
    }
    .code-chip:hover { background: #ddd; }
    .code-chip:hover::after {
      content: attr(data-desc);
      position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 6px 12px; border-radius: 4px;
      font-size: 0.75rem; white-space: normal; width: 220px; text-align: center; z-index: 10; font-family: sans-serif;
    }

    .edu-box { background: var(--edu-bg); padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid #BBDEFB; }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 1.2rem; }
    
    ul { padding-left: 20px; margin: 10px 0; }
    li { margin-bottom: 5px; }
  </style>
</head>

        cpts: ["97110", "97112"], outcomeMeasures: ["TUG", "Berg Balance"],
        highly: ["Aerobic conditioning", "Balance assessment"], moderately: ["Strength training"],
        notRec: ["High-intensity without clearance"], patientEdu: "Aerobic exercise improves cardiovascular health to prevent future events."
      }
    ];

    const searchBar = document.getElementById('search-bar');
    const conditionList = document.getElementById('condition-list');
    const mainContent = document.getElementById('main-content');

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
      const originalTitle = document.title;
      document.title = "COPIED: " + text;
      setTimeout(() => document.title = originalTitle, 1500);
    }

    function renderList(data) {
      conditionList.innerHTML = '';
      data.forEach(item => {
        const listItem = document.createElement('div');
        listItem.className = 'list-item';
        listItem.innerHTML = `<div class="list-item-title">${item.condition}</div><div class="list-item-meta">${item.bodyRegion}</div>`;
        listItem.onclick = () => {
          renderDetail(item);
          document.querySelectorAll('.list-item').forEach(el => el.style.backgroundColor = 'white');
          listItem.style.backgroundColor = '#E8F0FE';
        };
        conditionList.appendChild(listItem);
      });
    }

    function renderDetail(item) {
      const renderLi = (arr) => arr && arr.length > 0 ? arr.map(i => `<li>${i}</li>`).join('') : '<li>None listed</li>';
      
      mainContent.innerHTML = `
        <div class="detail-view">
          <div class="detail-region">${item.bodyRegion} | ${item.academy} Academy</div>
          <h2 class="detail-title">${item.condition}</h2>

          <div class="red-flags-box">
            <h4>⚠️ Clinical Red Flags (Screen First)</h4>
            <ul>${renderLi(item.redFlags)}</ul>
          </div>

          <div class="info-grid">
            <div class="card">
              <h3>Documentation (Click to Copy)</h3>
              
              <span class="code-label">Diagnosis Codes</span>
              ${item.icd10 ? item.icd10.map(obj => `<span class="code-chip" data-desc="${obj.desc}" onclick="copyToClipboard('${obj.code}')">${obj.code}</span>`).join('') : 'N/A'}
              
              <span class="code-label" style="margin-top:10px">Broad/Category Codes</span>
              ${item.broadCodes ? item.broadCodes.map(obj => `<span class="code-chip" style="background:#e3f2fd" data-desc="${obj.desc}" onclick="copyToClipboard('${obj.code}')">${obj.code}</span>`).join('') : 'N/A'}

              <span class="code-label" style="margin-top:10px">CPT Codes</span>
              ${item.cpts ? item.cpts.map(code => `<span class="code-chip" style="background:#fff9c4" data-desc="${cptDict[code] || 'CPT Code'}" onclick="copyToClipboard('${code}')">${code}</span>`).join('') : 'N/A'}
              
              <p style="font-size:0.7rem; margin-top:10px; color:gray">Hover for desc. Yellow = CPT.</p>
            </div>
            <div class="card">
              <h3>Outcome Measures (PROMs)</h3>
              <ul>${renderLi(item.outcomeMeasures)}</ul>
            </div>
          </div>

          <div class="rec-box high">
            <strong style="color:#2E7D32">Highly Recommended:</strong>
            <ul>${renderLi(item.highly)}</ul>
          </div>
          
          <div class="rec-box mod">
            <strong style="color:#E65100">Moderately Recommended:</strong>
            <ul>${renderLi(item.moderately)}</ul>
          </div>

          <div class="rec-box not-rec">
             <strong style="color:#C62828">Not Recommended:</strong>
             <ul>${renderLi(item.notRec)}</ul>
          </div>

          <div class="edu-box">
            <strong style="color:#1565C0">Patient Education Script:</strong><br>
            <p style="margin-top:10px; line-height:1.5">"${item.patientEdu || 'Educate patient on management.'}"</p>
          </div>
        </div>
      `;
    }

    searchBar.oninput = (e) => {
      const term = e.target.value.toLowerCase();
      renderList(cpgData.filter(i => i.condition.toLowerCase().includes(term) || i.bodyRegion.toLowerCase().includes(term)));
    };

    renderList(cpgData.sort((a,b) => a.condition.localeCompare(b.condition)));
    mainContent.innerHTML = '<div class="empty-state">Select a condition to begin clinical review.</div>';
  </script>
</body>
</html>
